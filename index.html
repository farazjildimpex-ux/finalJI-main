<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#f8fafc" />
    <meta name="description" content="Professional Leather Import/Export Management System" />

    <!-- PWA Meta Tags -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="JILD IMPEX" />

    <!-- Manifest and Icons -->
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/favicon.svg" />

    <!-- Android Specific -->
    <meta name="application-name" content="JILD IMPEX" />

    <!-- Security and Performance -->
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="referrer" content="strict-origin-when-cross-origin" />

    <title>JILD IMPEX - Office Management</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>

    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js', { scope: '/' })
            .then((registration) => {
              console.log('SW registered');

              // When a new SW is found, ask it to activate immediately so the
              // installed PWA picks up new builds without requiring the user
              // to fully close and reopen the app.
              registration.addEventListener('updatefound', () => {
                const newWorker = registration.installing;
                if (!newWorker) return;
                newWorker.addEventListener('statechange', () => {
                  if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                    newWorker.postMessage({ type: 'SKIP_WAITING' });
                  }
                });
              });

              // Check for updates each time the PWA regains focus / starts.
              if (document.visibilityState === 'visible') registration.update();
              document.addEventListener('visibilitychange', () => {
                if (document.visibilityState === 'visible') registration.update();
              });
            })
            .catch((err) => console.warn('SW registration failed:', err));

          // Reload the page exactly once when the new SW takes control,
          // so the freshly-deployed bundle hashes are loaded from the network.
          let reloaded = false;
          navigator.serviceWorker.addEventListener('controllerchange', () => {
            if (reloaded) return;
            reloaded = true;
            window.location.reload();
          });
        });
      }
    </script>
  </body>
</html>
