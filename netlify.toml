[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"
  # This forces pnpm to ignore the lockfile mismatch during the install phase
  PNPM_FLAGS = "--no-frozen-lockfile"

[functions]
  node_bundler = "esbuild"
  external_node_modules = ["pdf-parse"]

# SPA fallback: every non-asset URL (including /app/home, /app/contracts/…,
# bookmarks, and PWA refreshes) must serve index.html so React Router can
# resolve the route on the client. Without this Netlify returns 404 on refresh.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200